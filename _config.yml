title: Linear Algebra for Computer Vision, Graphics and AI
description: An applied introduction to linear algebra for engineering and AI students.

baseurl: /linear-algebra

theme: minima

permalink: pretty

markdown: kramdown
kramdown:
  input: GFM
  math_engine: mathjax

header_pages:
  - syllabus.md
  - prerequisites.md
  - glossary.md
  - projects/index.md

minima:
  skin: auto

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - plan.md

defaults:
  - scope:
      path: ""
    values:
      layout: lesson
