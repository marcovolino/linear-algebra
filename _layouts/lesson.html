---
layout: default
---
<article class="lesson">
  <header class="post-header lesson-header">
    {% if page.module %}
      <p class="breadcrumb">Module {{ page.module }}{% if page.lesson %} / Lesson {{ page.lesson }}{% endif %}</p>
    {% endif %}
    <h1 class="post-title">{{ page.title | escape }}</h1>
  </header>

  {% include lesson-objectives.html %}

  <div class="post-content lesson-content">
    {{ content }}
  </div>

  {% include lesson-nav.html %}
</article>
